name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify dist output
        run: |
          test -f dist/manifest.js || (echo "Missing dist/manifest.js" && exit 1)
          test -f dist/worker.js || (echo "Missing dist/worker.js" && exit 1)
          test -d dist/ui || (echo "Missing dist/ui/" && exit 1)
